    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "9";}
          ESP_LOGD("increment_digit_9", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_0
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "0";}
          ESP_LOGD("increment_digit_0", "Current PIN: %s", id(current_pin).c_str());

  - id: garage_btn_check
    then:
      - if:
          condition:
            binary_sensor.is_on: garage_up_allowed
          then:
            - lvgl.widget.enable: btn_up
            - lvgl.widget.update:
                id: btn_up
                bg_color: ${theme_color_primary}
                bg_opa: cover
                #Blue bg color
          else:

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: display_time
            text: !lambda |-
              char buf[6];
              auto t = id(ha_time).now();
              snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          #update clock in status bar
          - lvgl.label.update:
              id: display_time
              text: !lambda |-
                char buf[6];
                auto t = id(ha_time).now();
                snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
                return std::string(buf);

          # Also keep idle page clock in sync
          # Date + Month "06 Jun"
          - lvgl.label.update:
              id: idle_date_month
              text: !lambda |-
                auto t = id(ha_time).now();

                const char* months[] = {
                  "${jan}", "${feb}", "${mar}", "${apr}", "${may}", "${jun}",
                  "${jul}", "${aug}", "${sept}", "${oct}", "${nov}", "${dec}"
                };

                char buf[10];
                snprintf(buf, sizeof(buf), "%02d %s",
                         t.day_of_month,
                         months[t.month - 1]);

                return std::string(buf);

          # Day "Fri"
          - lvgl.label.update:
              id: idle_day
              text: !lambda |-
                auto t = id(ha_time).now();

                const char* days[] = {
                  "${sunday}", "${monday}", "${tuesday}", "${wednesday}",
                  "${thursday}", "${friday}", "${saturday}"
                };

                return std::string(days[t.day_of_week - 1]);          

      - seconds: 0 #scheduled display on and off
        minutes: 0
        then:
          - if:
              condition:
                lambda: |-
                  auto t = id(ha_time).now();
                  int end_h = (int) id(display_off_end).state;
                  return (t.hour == end_h);
              then:               
                - if:
                    condition:
                      lambda: 'return !id(screen_active);'
                    then:
                      - light.turn_on:
                          id: display_backlight
                          brightness: 35%

          - if:
              condition:
                lambda: |-
                  auto t = id(ha_time).now();
                  int start_h = (int) id(display_off_start).state;
                  return (t.hour == start_h);
              then:               
                - if:
                    condition:
                      lambda: 'return !id(screen_active);'
                    then:
                      - light.turn_off:
                          id: display_backlight

switch:
  - platform: gpio
    name: Relay 1
    id: relay1
    pin:
      number: GPIO40
      inverted: False
  - platform: gpio
    name: Relay 2
    id: relay2
    pin:
      number: GPIO2
      inverted: False
  - platform: gpio
    name: Relay 3
    id: relay3
    pin:
      number: GPIO1
      inverted: False

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

interval:
  - interval: 300ms
    id: pin_udate
    then:
      - lvgl.label.update:
          id: pin_display
          text: !lambda |-
            std::string pin = id(current_pin);
            std::string masked = "";
            for (int i = 0; i < pin.length(); i++) {
              masked += "*";
            }
            if (masked.empty()) return std::string("----");
            return masked;

  - interval: 3s
    id: light_ctr_btn_udate
    then:
      - script.execute: garage_btn_check
      - script.execute: living_room_light_check
display:
  - platform: st7701s
    id: tft_display
    show_test_card: False
    dimensions:
      width: 480
      height: 480
    #    rotation: 270    #uncomment for placement with down-facing USB socket
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: False
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: False
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: False
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10] # CMD2_BKSEL_BK0
      - [0xCD, 0x00] # disable MDT flag
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display
    #transform:     #uncomment for placement with down-facing USB socket
    #  swap_xy: true
    #  mirror_x: true
    on_touch:
      then:
        - if:
            condition:
              lambda: 'return !id(screen_active);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: 80%
                  transition_length: 200ms
              - delay: 350ms
              - lvgl.page.show: main_page
              - lambda: |-
                  id(screen_active) = true;
        - script.execute: inactivity_timer
        

number:
  - platform: template
    name: "Start Hour - Display Off "
    id: display_off_start
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: mdi:clock-minus-outline

  - platform: template
    name: "End Hour - Display Off "
    id: display_off_end
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: mdi:clock-plus-outline


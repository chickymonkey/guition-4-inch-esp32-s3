            - lvgl.label.update:
                id: bulb_icon_living
                text_color: 0xFFFFFF
            - lvgl.label.update:
                id: bulb_label_living1
                text_color: 0xFFFFFF
            - lvgl.label.update:
                id: bulb_label_living2
                text_color: 0xFFFFFF
   
          else:
            - lvgl.widget.update:
                id: light_switch_living

    on_value:
      - lvgl.arc.update:
          id: garage_gauge
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: garage_pct_label
          text: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", (int)x);
            return std::string(buf);
   # Reports the WiFi signal strength/RSSI in dB

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # WiFi signal in %
    source_id: wifi_signal_db
    id: wifi_signal_pct
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    on_value:
      then:
        - lvgl.label.update:
            id: wifi_db_label
            text:
              format: "%.0f%%"
              args: [ 'x' ]

  #weather
  #Home assistant sensor values
  - platform: homeassistant
    id: max_temp_today
    entity_id: ${temp_max_today}
    on_value:
      - lambda: |-
          char buf[12];
          snprintf(buf, sizeof(buf), "%.0f / %.0f°C",
            id(min_temp_today).state,
            id(max_temp_today).state);
          lv_label_set_text(id(idle_wx_today_temps), buf);

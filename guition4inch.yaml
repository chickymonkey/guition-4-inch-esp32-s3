#ESP now config - Provider
espnow:
  id: espnow_garage
  auto_add_peer: True
  enable_on_boot: True
  on_receive:
    then:
      - lambda: |-
          if (size == 4 &&
              data[0] == 0x00 &&
              data[1] == 0x00 &&
              data[2] == 0x34 &&
              data[3] == 0x5D) {

            ESP_LOGI("espnow", "Valid command received from Button, toggling the switch");

            id(relay3).toggle();
            
            static unsigned long last_time = 0;

            if (millis() - last_time > 800) {
              last_time = millis();
              // delay 800ms
              // Send ACK back via script
              id(send_ack).execute();
            }

          }
          
packet_transport:
  - platform: espnow
    id: transport_unicast
    espnow_id: espnow_garage
    peer_address: ${espnow_peer1}



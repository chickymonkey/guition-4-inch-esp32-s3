script:
  - id: inactivity_timer
    mode: restart
    then:
      - delay: 61s
      # Mark inactive
      - lambda: |-
          id(screen_active) = false;
      # Update idle page labels

      # Show idle page
      - lvgl.page.show: idle_page

      # Now handle backlight — one clean decision, no pre-check
      - if:
          condition:
            lambda: |-
              auto t = id(ha_time).now();
              int start_h = (int) id(display_off_start).state;
              int end_h   = (int) id(display_off_end).state;
              if (start_h > end_h) {
                return (t.hour >= start_h || t.hour < end_h);
              } else {
                return (t.hour >= start_h && t.hour < end_h);
              }
          then:
            # Night window — turn off completely
            - light.turn_off:
                id: display_backlight
          else:
            # Daytime — dim to 35% for idle
            - light.turn_on:
                id: display_backlight
                brightness: 35%

  #Alarmo code
  - id: increment_digit_1
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "1";}
          ESP_LOGD("increment_digit_1", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_2
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "2";}
          ESP_LOGD("increment_digit_2", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_3
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "3";}
          ESP_LOGD("increment_digit_3", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_4
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "4";}
          ESP_LOGD("increment_digit_4", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_5
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "5";}
          ESP_LOGD("increment_digit_5", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_6
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "6";}
          ESP_LOGD("increment_digit_6", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_7
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "7"; }
          ESP_LOGD("increment_digit_7", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_8
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "8";}
          ESP_LOGD("increment_digit_8", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_9
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "9";}
          ESP_LOGD("increment_digit_9", "Current PIN: %s", id(current_pin).c_str());

  - id: increment_digit_0
    then:
      - lambda: |-
          if (id(current_pin).length() < 10) { id(current_pin) += "0";}
          ESP_LOGD("increment_digit_0", "Current PIN: %s", id(current_pin).c_str());

  - id: garage_btn_check
    then:
      - if:
          condition:
            binary_sensor.is_on: garage_up_allowed
          then:
            - lvgl.widget.enable: btn_up
            - lvgl.widget.update:
                id: btn_up
                bg_color: 0x2F8CD8
                bg_opa: cover
                #Blue bg color
          else:
            - lvgl.widget.disable: btn_up
            - lvgl.widget.update:
                id: btn_up
                bg_color: 0x6e6d6d
                bg_opa: cover
                #Grey bg color

      - if:
          condition:
            binary_sensor.is_on: garage_stop_allowed
          then:
            - lvgl.widget.enable: btn_stop
            - lvgl.widget.update:
                id: btn_stop

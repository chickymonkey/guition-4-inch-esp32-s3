---
substitutions:
  #garage door control and state in the Home assitant:
  garage_up: button.garage_roller_door_garage_up
  garage_stop: button.garage_roller_door_garage_stop
  garage_down: button.garage_roller_door_garage_down

  garage_roller_door_position: sensor.garage_roller_door_garage_position

  #lights:
  light1: light.garage_light_1
  light2: light.group_living_room
  ##Scene list: make sure you have scene created in Home assistant, like "away home", "back_home"
  scene1: scene.away_home
  scene2: scene.back_home
  # Alarm: Alarmo used here, change this to your alarm control entity id if you are using different one.
  alarmo_id: alarm_control_panel.alarmo
  # idle apge: temperature sensors, which usually can get via local bom integration:
  temp_max_today: sensor.temp_max_today
  temp_min_today: sensor.temp_min_today
  temp_max_tomorrow: sensor.sensor_bom_temp_max_1
  temp_min_tomorrow: sensor.sensor_bom_temp_min_1
  temp_max_day_after: sensor.sensor_bom_temp_max_2
  temp_min_day_after: sensor.sensor_bom_temp_min_2
  #wall paper
  #idle_bg_file: /config/esphome/images/default/planet2.jpg
  idle_bg_file: https://github.com/chickymonkey/guition-4-inch-esp32-s3/raw/7536460d72daeb86abe9635b221afafb6bceface/planet2.jpg
  #don't change anything below
  # Number pad Column X positions
  numpad_x1: "90"
  numpad_x2: "215"
  numpad_x3: "340"
  # Number pad Row Y positions
  numpad_y1: "95"   # Row 1 (1,2,3)
  numpad_y2: "170"  # Row 2 (4,5,6)
  numpad_y3: "245"  # Row 3 (7,8,9)
  numpad_y4: "315"  # Row 4 (Clear, 0)

  #style
  theme_color_primary: "0xF28B42" #orange
  theme_color_secondary: "0xC8B1A0" #light orange
  theme_color_inactive: "0x6e6d6d"
esphome:
  name: "guition-esp32-s3-4848s040"
  friendly_name: "Guition 4inch Relay"
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - script.execute: inactivity_timer
      - delay: 8s
      - script.execute: garage_btn_check
      - script.execute: living_room_light_check
      - component.update: tft_display

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      #COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
    advanced:
      #Added for optimization
      execute_from_psram: "true"
      compiler_optimization: "PERF"

psram:
  mode: octal
  speed: 80MHz
logger:
  level: WARN
  
ota:
  - platform: esphome
    password: "Your_password"
    on_begin: # prevent  flickering during OTA
      - light.turn_off:
          id: display_backlight
          transition_length: 0s
      - lambda: "id(display_backlight).loop();"
captive_portal:
web_server:  
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: display_time
            text: !lambda |-
              char buf[6];
              auto t = id(ha_time).now();
              snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          #update clock in status bar
          - lvgl.label.update:
              id: display_time
              text: !lambda |-
                char buf[6];
                auto t = id(ha_time).now();
                snprintf(buf, sizeof(buf), "%02d:%02d", t.hour, t.minute);
                return std::string(buf);

          # Also keep idle page clock in sync
          #Test new time
          # AM / PM
          - lvgl.label.update:
              id: lbl_ampm
              text: !lambda |-
                auto t = id(ha_time).now();
                return (t.hour >= 12) ? "PM" : "AM";
          # Main clock
          - lvgl.label.update:
              id: lbl_hour
              text: !lambda |-
                auto t = id(ha_time).now();

                int hour = t.hour % 12;
                if (hour == 0) hour = 12;
                char buf[8];
                snprintf(buf, sizeof(buf), "%02d", hour);

                return std::string(buf);
          - lvgl.label.update:
              id: lbl_min
              text: !lambda |-
                auto t = id(ha_time).now();
                char buf[8];
                snprintf(buf, sizeof(buf), "%02d", t.minute);

                return std::string(buf);
          # Day of week
          - lvgl.label.update:
              id: lbl_day
              text: !lambda |-
                auto t = id(ha_time).now();

                static const char *days[] = {
                  "SUNDAY",
                  "MONDAY",
                  "TUESDAY",
                  "WEDNESDAY",
                  "THURSDAY",
                  "FRIDAY",
                  "SATURDAY"
                };

                return std::string(days[t.day_of_week - 1]);

          # Date
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto t = id(ha_time).now();

                static const char *months[] = {
                  "JAN","FEB","MAR","APR","MAY","JUN",
                  "JUL","AUG","SEP","OCT","NOV","DEC"
                };

                char buf[24];

                snprintf(buf,
                         sizeof(buf),
                         "%s %02d, %04d",
                         months[t.month - 1],
                         t.day_of_month,
                         t.year);

                return std::string(buf);        

      - seconds: 0 #scheduled display on and off
        minutes: 0
        then:
          - if:
              condition:
                lambda: |-
                  auto t = id(ha_time).now();
                  int end_h = (int) id(display_off_end).state;
                  return (t.hour == end_h);
              then:               
                - if:
                    condition:
                      lambda: 'return !id(screen_active);'
                    then:
                      - light.turn_on:
                          id: display_backlight
                          brightness: 35%

          - if:
              condition:
                lambda: |-
                  auto t = id(ha_time).now();
                  int start_h = (int) id(display_off_start).state;
                  return (t.hour == start_h);
              then:               
                - if:
                    condition:
                      lambda: 'return !id(screen_active);'
                    then:
                      - light.turn_off:
                          id: display_backlight

switch:
  - platform: gpio
    name: Relay 1
    id: relay1
    pin:
      number: GPIO40
      inverted: False
  - platform: gpio
    name: Relay 2
    id: relay2
    pin:
      number: GPIO2
      inverted: False
  - platform: gpio
    name: Relay 3
    id: relay3
    pin:
      number: GPIO1
      inverted: False

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

interval:
  - interval: 300ms
    id: pin_udate
    then:
      - lvgl.label.update:
          id: pin_display
          text: !lambda |-
            std::string pin = id(current_pin);
            std::string masked = "";
            for (int i = 0; i < pin.length(); i++) {
              masked += "*";
            }
            if (masked.empty()) return std::string("----");
            return masked;

  - interval: 3s
    id: light_ctr_btn_udate
    then:
      - script.execute: garage_btn_check
      - script.execute: living_room_light_check
display:
  - platform: st7701s
    id: tft_display
    show_test_card: False
    dimensions:
      width: 480
      height: 480
    #    rotation: 270    #uncomment for placement with down-facing USB socket
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: False
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: False
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: False
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10] # CMD2_BKSEL_BK0
      - [0xCD, 0x00] # disable MDT flag
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display
    #transform:     #uncomment for placement with down-facing USB socket
    #  swap_xy: true
    #  mirror_x: true
    on_touch:
      then:
        - if:
            condition:
              lambda: 'return !id(screen_active);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: 80%
                  transition_length: 200ms
              - delay: 350ms
              - lvgl.widget.show:
                  id: display_time
              - lvgl.page.show: main_page
              - lambda: |-
                  id(screen_active) = true;
        - script.execute: inactivity_timer
        
lvgl:
  style_definitions:
    - id: numpad_btn
      bg_color: 0x373734
      border_color: 0x373734
      border_width: 1
      border_opa: 50%
      shadow_opa: TRANSP
      shadow_width: 0
      radius: 25
      width: 50
      height: 50

    - id: numpad_label
      text_color: 0xc8c4ff
      text_font: montserrat_22

    - id: clear_btn
      bg_color: 0x1a0f0f
      border_color: 0x742a2a
      border_width: 1
      border_opa: 50%
      shadow_opa: TRANSP
      shadow_width: 0
      radius: 25
      width: 110
      height: 35

    - id: clear_label
      text_color: 0xfc8181
      text_font: montserrat_14
    - id: garage_btn_style
      width: 70
      height: 70
      radius: 35
      bg_color: ${theme_color_inactive}
      #bg_opa: cover
      border_color: 0x2a2840
      border_width: 1
      border_opa: 50%
      shadow_opa: TRANSP
      shadow_width: 0

  buffer_size: 100%
  top_layer:
    y: 0
    height: 34
    widgets:
      - label:
          id: wifi_icon_label
          x: 8
          y: 2
          text: "\U000F0928"
          text_color: ${theme_color_secondary}
          text_font: icon_font_20
      - label:
          id: wifi_db_label
          x: 45
          y: 4
          text: "--%"
          text_color: ${theme_color_secondary}
          text_font: montserrat_16

      # ======CLOCK DISPLAY (Top-center)
      - label:
          text: "--:--"
          id: display_time
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: ${theme_color_secondary}
          text_font: montserrat_16

  pages:
    - id: main_page
      widgets:
        # TAB VIEW (MAIN UI)
        - tabview:
            id: main_tabs
            position: bottom
            y: 0
            pad_top: 34
            height: 480
            bg_color: 0x050505
            bg_opa: cover
            scrollbar_mode: "off"
            scrollable: False
            scroll_dir: "none"

            tab_style:
              bg_color: 0x0b0a09
              bg_opa: cover
              border_side: top
              border_color: 0x373734
              border_width: 1
              height: 50
              items:
                text_color: 0xeeeeee
                text_font: montserrat_20
                checked:
                  text_color: ${theme_color_primary}
                  bg_color: 0x1a1816
                  bg_opa: 100%
                  #border bottom style
                  border_side: BOTTOM
                  border_color: ${theme_color_primary}
                  border_width: 4

            tabs:
              # Tab 1 - GARAGE
              - name: "Garage"
                id: tab_garage
                width: 100%
                text_font: icon_font_80
                bg_color: 0x050505
                bg_opa: cover
                scrollable: False
                scrollbar_mode: "off"
                scroll_dir: "none"
                widgets:
                  - button: #light switch Garage
                      id: light_switch
                      align: BOTTOM_LEFT
                      x: 20
                      y: -130
                      width: 60
                      height: 200
                      radius: 26
                      bg_color: 0x2a2a2a
                      bg_opa: cover
                      border_width: 0
                      shadow_opa: TRANSP
                      shadow_width: 0
                      on_click:
                        - homeassistant.action:
                            action: light.toggle
                            data:
                              entity_id: ${light1}

                      widgets:
                        - obj:
                            id: light_switch_fill
                            align: TOP_MID
                            y: -10
                            width: 60
                            height: 0          # starts hidden
                            bg_color: 0xFF8C00
                            bg_opa: COVER
                            border_width: 0
                            radius: 26
                            pad_all: 0
                            on_click:
                              - homeassistant.action:
                                  action: light.toggle
                                  data:
                                    entity_id: ${light1}
                        - label:
                            id: bulb_icon_garage
                            text: "\U000F17C7"
                            align: TOP_MID
                            y: 5
                            text_font: icon_font_40
                            text_color: 0x888888
                        - label:
                            id: bulb_label_garage
                            text: "Garage"
                            align: CENTER
                            y: -10
                            text_font: montserrat_14
                            text_color: 0x888888

                  - arc:
                      id: garage_gauge
                      align: CENTER
                      y: -45
                      width: 250
                      height: 250
                      min_value: 0
                      max_value: 100
                      arc_color: 0x2a2623
                      indicator:
                        arc_color: ${theme_color_primary}
                        width: 10

                  - label:
                      text: "Roller Door"
                      align: TOP_MID
                      text_font: montserrat_16
                      text_color: 0xeeeeee
                      y: 110

                  - label:
                      id: garage_pct_label
                      text_font: montserrat_48
                      align: CENTER
                      text_color: 0xeeeeee

                  - button:
                      id: light_switch_living
                      align: BOTTOM_RIGHT
                      x: -20
                      y: -130
                      width: 60
                      height: 200
                      radius: 26
                      bg_color: 0x2a2a2a
                      bg_opa: cover
                      border_width: 0
                      shadow_opa: TRANSP
                      shadow_width: 0
                      on_click:
                        - homeassistant.action:
                            action: light.toggle
                            data:
                              entity_id: ${light2}
                              #entity_id: light.aqara_hub_892a_lightbulb_892a
                      widgets:
                        - obj:
                            id: light_switch_living_fill
                            align: TOP_MID
                            y: -10
                            width: 60
                            height: 0          # starts hidden
                            bg_color: 0xFF8C00
                            bg_opa: COVER
                            border_width: 0
                            radius: 26          # match your button radius if needed
                            pad_all: 0
                            on_click:
                              - homeassistant.action:
                                  action: light.toggle
                                  data:
                                    entity_id: ${light2}
                                    #entity_id: light.aqara_hub_892a_lightbulb_892a
                        - label:
                            id: bulb_icon_living
                            text: "\U000F17C7"
                            align: TOP_MID
                            y: 5
                            text_font: icon_font_40
                            text_color: 0x888888
                        - label:
                            id: bulb_label_living1
                            text: "Living"
                            align: CENTER
                            y: -10
                            text_font: montserrat_14
                            text_color: 0x888888
                        - label:
                            id: bulb_label_living2
                            text: "Room"
                            align: CENTER
                            y: 10
                            text_font: montserrat_14
                            text_color: 0x888888

                  - button: #btn_up
                      id: btn_up
                      align: BOTTOM_LEFT
                      x: 15
                      y: -15
                      styles: garage_btn_style
                      pressed: #change on press.
                        bg_color: 0x000000
                        bg_opa: 60%
                      on_click:
                        - homeassistant.action:
                            action: button.press
                            data:
                              entity_id: ${garage_up}
                      widgets:
                        - label:
                            text: "\U000F0143"
                            align: CENTER
                            text_font: icon_font_40

                  - button: #button stop
                      id: btn_stop
                      align: BOTTOM_MID
                      y: -15
                      styles: garage_btn_style
                      pressed: #change on press.
                        bg_color: 0x000000
                        bg_opa: 60%
                      on_click:
                        - homeassistant.action:
                            action: button.press
                            data:
                              entity_id: ${garage_stop}
                      widgets:
                        - label:
                            text: "STOP"
                            align: CENTER
                            text_font: montserrat_16

                  - button: #button down
                      id: btn_down
                      align: BOTTOM_RIGHT
                      x: -15
                      y: -15
                      styles: garage_btn_style
                      pressed: #change on press.
                        bg_color: 0x000000
                        bg_opa: 60%
                      on_click:
                        - homeassistant.action:
                            action: button.press
                            data:
                              entity_id: ${garage_down}
                      widgets:
                        - label:
                            text: "\U000F0140"
                            align: CENTER
                            text_font: icon_font_40

              # Tab 2 - SCENE
              - name: "Scene"
                id: tab_scene
                scrollbar_mode: "off"
                scroll_dir: "none"
                scrollable: False
                width: 100%
                bg_color: 0x050505
                bg_opa: cover
                pad_bottom: 5
                pad_left: 5
                pad_right: 5
                widgets:
                  - button: #away home button
                      id: away_home_btn
                      align: CENTER
                      x: -110
                      y: -80
                      width: 190
                      height: 140
                      bg_color: 0x2196F3
                      bg_grad_color: 0x2ECC71
                      bg_grad_dir: VER
                      bg_opa: COVER
                      border_color: 0x2196F3
                      border_width: 1
                      border_opa: 50%
                      shadow_opa: TRANSP
                      shadow_width: 0
                      pressed: #change on press.
                        bg_color: 0x000000
                        bg_opa: 60%
                      on_click:
                        - homeassistant.action:
                            action: scene.turn_on
                            data:
                              entity_id: ${scene1}
                      widgets:
                        - label:
                            text: "\U000F0F9B"
                            text_color: 0xffffff
                            text_font: icon_font_80
                            align: LEFT_MID
                        - label:
                            text: "Away"
                            text_color: 0xffffff
                            text_font: montserrat_20
                            align: RIGHT_MID
                            y: -10
                            pad_left: 20
                        - label:
                            text: "Home"
                            text_color: 0xffffff
                            text_font: montserrat_20
                            align: RIGHT_MID
                            y: 15
                            pad_left: 20

                  - button: #back home button
                      id: back_home_btn
                      align: CENTER
                      x: 110
                      y: -80
                      width: 190
                      height: 140
                      bg_color: 0x2ECC71
                      bg_grad_color: 0xFFD60A
                      bg_grad_dir: VER
                      border_color: 0x2ECC71
                      border_width: 1
                      border_opa: 50%
                      shadow_opa: TRANSP
                      shadow_width: 0
                      pressed: #change on press.
                        bg_color: 0x000000
                        bg_opa: 60%
                      on_click:
                        - homeassistant.action:
                            action: scene.turn_on
                            data:
                              entity_id: ${scene2}
                      widgets:
                        - label:
                            text: "\U000F0F9C"
                            text_color: 0xffffff
                            text_font: icon_font_80
                            align: LEFT_MID
                        - label:
                            text: "Back"
                            text_color: 0xffffff
                            text_font: montserrat_20
                            align: RIGHT_MID
                            y: -10
                            pad_left: 20
                        - label:
                            text: "Home"
                            text_color: 0xffffff
                            text_font: montserrat_20
                            align: RIGHT_MID
                            y: 15
                            pad_left: 20

              # Tab 3 - ALARM (unchanged content continues...)
              - name: "Alarm"
                id: tab_alarm
                scrollbar_mode: "off"
                scroll_dir: "none"
                scrollable: False
                width: 100%
                bg_color:  0x050505
                bg_opa: cover
                pad_bottom: 5
                pad_left: 5
                pad_right: 5
                widgets:
                  - label:
                      id: alarm_label
                      text: "Status: LOADING..."
                      align: TOP_MID
                      y: 3
                      text_color: 0xc8c4ff
                      text_font: montserrat_16

                  # ── Action row ──────────────────────────────
                  - button:
                      id: btn_arm_away
                      x: 55
                      y: 35
                      width: 110
                      height: 35
                      radius: 25
                      bg_color: 0x221a08
                      border_color: 0x6b4f0a
                      border_width: 1
                      border_opa: 50%
                      shadow_opa: TRANSP
                      shadow_width: 0
                      on_click:
                        - homeassistant.action:
                            action: alarm_control_panel.alarm_arm_away
                            data:
                              entity_id: ${alarmo_id}
                              code: !lambda return id(current_pin).c_str();
                        - lambda: id(current_pin) = "";
                      widgets:
                        - label:
                            text: "Arm Away"
                            text_color: 0xFF8C00
                            text_font: montserrat_16
                            align: CENTER

                  - label:
                      id: pin_display
                      text: "----"
                      align: TOP_MID
                      y: 47
                      text_font: montserrat_22
                      text_color: 0xbbbbbb

                  - button:
                      id: btn_arm_night
                      x: 305
                      y: 35
                      width: 110
                      height: 35
                      radius: 25
                      bg_color: 0x221a08
                      border_color: 0x6b4f0a
                      border_width: 1
                      border_opa: 50%
                      shadow_opa: TRANSP
                      shadow_width: 0
                      on_click:
                        - homeassistant.action:
                            action: alarm_control_panel.alarm_arm_night
                            data:
                              entity_id: ${alarmo_id}
                              code: !lambda return id(current_pin).c_str();
                        - lambda: id(current_pin) = "";
                      widgets:
                        - label:
                            text: "Arm Night"
                            text_color: 0xFF8C00
                            text_font: montserrat_16
                            align: CENTER

                  # ── Numpad Row 1 ──────────────────────────────
                  - button:  #1
                      styles: numpad_btn
                      x: ${numpad_x1}
                      y: ${numpad_y1}
                      on_click:
                        - script.execute: increment_digit_1
                        - script.execute: inactivity_timer
                      widgets:
                        - label:
                            text: "1"
                            text_color: 0xc8c4ff
                            text_font: montserrat_22
                            align: CENTER

                  - button:  #2
                      x: ${numpad_x2}
                      y: ${numpad_y1}
                      styles: numpad_btn
                      on_click:
                        - script.execute: increment_digit_2
                        - script.execute: inactivity_timer
                      widgets:
                        - label:
                            text: "2"
                            text_color: 0xc8c4ff
                            text_font: montserrat_22
                            align: CENTER

                  - button:

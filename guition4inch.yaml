            - lvgl.label.update: 
                id: bulb_icon_living
                text_color: 0x888888
            - lvgl.label.update:
                id: bulb_label_living1
                text_color: 0x888888
            - lvgl.label.update:
                id: bulb_label_living2
                text_color: 0x888888
  #esp now
  - id: send_ack
    then:
      - espnow.send:
          address: "98:A3:16:8E:C4:CC"
          data: !lambda "return {0xAC, 0xA0};"
      - logger.log: "Sending ACK packet"


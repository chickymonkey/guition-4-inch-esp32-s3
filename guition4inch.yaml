          else:
            - lvgl.widget.disable: btn_down
            - lvgl.widget.update:
                id: btn_down
                bg_color: 0x6e6d6d
                bg_opa: cover

  - id: living_room_light_check
    then:
      - if:
          condition:
            binary_sensor.is_on: light_state_living_room
          then:
            - lvgl.widget.update:
                id: light_switch_living

text_sensor:
  - platform: homeassistant
    name: "Alarm Status"
    entity_id: alarm_control_panel.alarmo
    id: alarm_status
    on_value:
      - lvgl.label.update:
          id: alarm_label
          text: !lambda |-
            auto s = id(alarm_status).state;
            if (s == "disarmed")            return {"Status: Disarmed"};
            if (s == "arming")              return {"Status: Arming"};
            if (s == "armed_away")          return {"Status: Armed Away"};
            if (s == "armed_home")          return {"Status: Armed Home"};
            if (s == "armed_night")         return {"Status: Armed Night"};
            if (s == "armed_vacation")      return {"Status: Armed Vacation"};
            if (s == "armed_custom_bypass") return {"Status: Armed Custom"};
            if (s == "pending")             return {"Status: Pending"};
            if (s == "triggered")           return {"Status: Triggered"};
            if (s == "unavailable")         return {"Status: Unavailable"};
            return {"Status: Unknown"};
      - lvgl.label.update:
          id: alarm_label
          text_color: !lambda |-
            auto s = id(alarm_status).state;
            if (s == "disarmed")            return lv_color_hex(0x00E676); // Green
            if (s == "arming")              return lv_color_hex(0xFFD600); // Amber
            if (s == "armed_away")          return lv_color_hex(0xFF6D00); // Orange
            if (s == "armed_home")          return lv_color_hex(0xFF9100); // Light orange
            if (s == "armed_night")         return lv_color_hex(0x7C4DFF); // Purple
            if (s == "armed_vacation")      return lv_color_hex(0x00B0FF); // Sky blue
            if (s == "armed_custom_bypass") return lv_color_hex(0x00BCD4); // Cyan
            if (s == "pending")             return lv_color_hex(0xFFAB00); // Yellow-orange
            if (s == "triggered")           return lv_color_hex(0xFF1744); // Red
            return lv_color_hex(0x9E9E9E);  // Grey for unavailable/unknown

